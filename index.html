<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>환 조합 계산기</title>
</head>
<body>
  <h2>약초 선택 (3~5개)</h2>

  <div id="herbs"></div>
  <button onclick="calculate()">계산하기</button>

  <h3 id="result"></h3>
  <pre id="details"></pre>

<script>
const herbs = {
  "백향초": [0,24,15,23,10,0,6],
  "자운초": [0,21,15,26,10,0,6],
  "적주과": [0,21,16,25,10,0,6],
  "황초": [0,25,15,23,9,0,6],
  "흑성지": [0,21,15,26,10,0,6],

  "녹태": [0,27,6,20,19,6,0],
  "민들레": [0,26,6,20,20,6,0],
  "생강": [0,26,6,20,20,6,0],
  "영근버섯": [0,27,6,20,19,6,0],
  "옥취염": [0,26,6,20,20,6,0],

  "옥향초": [3,10,25,25,0,0,15],
  "인삼": [3,10,25,25,0,0,15],
  "권엽": [3,10,25,25,0,0,15],
  "금양강초": [3,11,23,26,0,0,15]
};

const names = ["강근","대력","명목","청심","활생","향토","회생"];

const container = document.getElementById("herbs");

Object.keys(herbs).forEach(name => {
  const label = document.createElement("label");
  label.innerHTML = `<input type="checkbox" value="${name}">${name}`;
  container.appendChild(label);
  container.appendChild(document.createElement("br"));
});

function calculate() {
  const selected = [...document.querySelectorAll("input:checked")].map(e => e.value);

  if (selected.length < 3 || selected.length > 5) {
    alert("약초는 3~5개 선택!");
    return;
  }

  let sum = [0,0,0,0,0,0,0];

  let sum = [0,0,0,0,0,0,0];

  selected.forEach(h => {
    herbs[h].forEach((v,i) => sum[i] += v);
  });

  let maxIndex = sum.indexOf(Math.max(...sum));

  document.getElementById("result").innerText =
    `결과 환: ${names[maxIndex]}환`;

  document.getElementById("details").innerText =
    names.map((n,i)=>`${n}: ${sum[i]}`).join("\n") +

</script>
</body>
</html>
